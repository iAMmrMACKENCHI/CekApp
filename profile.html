<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0284C7"/>
  <title>Profile — Physics with Vikas</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sora:["Sora","sans-serif"], dm:["DM Sans","sans-serif"] } } }
    }
  </script>
  <style>
    body { font-family:"DM Sans",sans-serif; background:#0F172A; color:#fff; }
    .card-glass { background:rgba(30,41,59,0.8); border:1px solid rgba(148,163,184,0.1); }
    .hero-glow { background:radial-gradient(ellipse 70% 30% at 50% 0%, rgba(2,132,199,.2) 0%, transparent 60%); }
  </style>
</head>
<body class="min-h-screen pb-24">
<div class="hero-glow absolute inset-0 h-48 pointer-events-none"></div>

<div class="relative z-10 max-w-md mx-auto w-full">

  <!-- Profile Header -->
  <div class="flex flex-col items-center pt-10 pb-6 px-5">
    <div class="w-20 h-20 rounded-2xl bg-sky-500 flex items-center justify-center font-sora font-bold text-3xl text-white mb-3 shadow-lg shadow-sky-500/30" data-user-initial>S</div>
    <h1 class="font-sora font-bold text-xl text-white" data-user-name>Student</h1>
    <p class="text-slate-400 text-sm mt-0.5" data-user-email>email@example.com</p>
    <p class="text-slate-500 text-xs mt-0.5" data-user-phone>+91 XXXXXXXXXX</p>
  </div>

  <!-- Stats -->
  <div class="mx-5 card-glass rounded-2xl p-4 flex justify-around mb-5">
    <div class="text-center">
      <p class="font-sora font-bold text-xl text-sky-400" id="reelsStat">0</p>
      <p class="text-slate-500 text-xs mt-0.5">Reels Saved</p>
    </div>
    <div class="w-px bg-slate-700"></div>
    <div class="text-center">
      <p class="font-sora font-bold text-xl text-sky-400" id="coursesStat">0</p>
      <p class="text-slate-500 text-xs mt-0.5">Courses</p>
    </div>
    <div class="w-px bg-slate-700"></div>
    <div class="text-center">
      <p class="font-sora font-bold text-xl text-sky-400" id="classStat">—</p>
      <p class="text-slate-500 text-xs mt-0.5">Class</p>
    </div>
  </div>

  <!-- Preferences -->
  <div class="px-5 mb-5">
    <h2 class="font-sora font-semibold text-white mb-3">Preferences</h2>
    <div class="card-glass rounded-2xl overflow-hidden">
      <div class="p-4 border-b border-slate-700">
        <p class="text-slate-400 text-xs mb-1">Your Class</p>
        <div class="flex gap-2" id="classPills">
          <button onclick="setClass('11')" id="cp11" class="class-pill px-4 py-1.5 rounded-full text-sm border border-slate-600 text-slate-300 hover:border-sky-500 transition">Class 11</button>
          <button onclick="setClass('12')" id="cp12" class="class-pill px-4 py-1.5 rounded-full text-sm border border-slate-600 text-slate-300 hover:border-sky-500 transition">Class 12</button>
          <button onclick="setClass('dropper')" id="cpdropper" class="class-pill px-4 py-1.5 rounded-full text-sm border border-slate-600 text-slate-300 hover:border-sky-500 transition">Dropper</button>
        </div>
      </div>
    </div>
  </div>

  <!-- My Courses -->
  <div class="px-5 mb-5">
    <h2 class="font-sora font-semibold text-white mb-3">My Courses</h2>
    <div id="profileCourses"></div>
  </div>

  <!-- Menu Items -->
  <div class="px-5 mb-5">
    <div class="card-glass rounded-2xl overflow-hidden divide-y divide-slate-700/50">
      <a href="reels.html" class="flex items-center gap-3 p-4 hover:bg-slate-800/50 transition">
        <span class="text-xl">🎬</span>
        <span class="text-white text-sm flex-1">Watch Reels</span>
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
      <a href="course.html" class="flex items-center gap-3 p-4 hover:bg-slate-800/50 transition">
        <span class="text-xl">📚</span>
        <span class="text-white text-sm flex-1">Browse Courses</span>
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
      <a href="https://wa.me/91XXXXXXXXXX" target="_blank" class="flex items-center gap-3 p-4 hover:bg-slate-800/50 transition">
        <span class="text-xl">💬</span>
        <span class="text-white text-sm flex-1">WhatsApp Support</span>
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>

  <!-- Logout -->
  <div class="px-5 mb-5">
    <button onclick="Auth.logout()" class="w-full bg-red-500/10 border border-red-500/30 text-red-400 font-medium py-3.5 rounded-2xl hover:bg-red-500/20 transition">
      Log Out
    </button>
  </div>

  <p class="text-center text-slate-600 text-xs pb-4">Physics with Vikas · v1.0</p>

</div>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-md border-t border-slate-800">
  <div class="flex justify-around py-3 max-w-md mx-auto">
    <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      <span class="text-xs">Home</span>
    </a>
    <a href="reels.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      <span class="text-xs">Reels</span>
    </a>
    <a href="course.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <span class="text-xs">Courses</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-1 text-sky-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <span class="text-xs">Profile</span>
    </a>
  </div>
</nav>

<script src="script.js"></script>
<script>
  Auth.requireAuth();

  const prefs = Prefs.get();
  const saved = JSON.parse(localStorage.getItem("pwv_saved") || "[]");
  const purchases = JSON.parse(localStorage.getItem("pwv_purchases") || "[]");

  document.getElementById("reelsStat").textContent = saved.length;
  document.getElementById("coursesStat").textContent = purchases.length;
  document.getElementById("classStat").textContent = prefs.class ? (prefs.class === "dropper" ? "Dropper" : prefs.class) : "—";

  // Class pill active state
  if (prefs.class) {
    const active = document.getElementById(`cp${prefs.class}`);
    if (active) { active.classList.add("border-sky-500","bg-sky-500/10","text-sky-400"); active.classList.remove("border-slate-600","text-slate-300"); }
  }

  function setClass(cls) {
    Prefs.set({ class: cls });
    document.querySelectorAll(".class-pill").forEach(p => { p.classList.remove("border-sky-500","bg-sky-500/10","text-sky-400"); p.classList.add("border-slate-600","text-slate-300"); });
    const el = document.getElementById(`cp${cls}`);
    if (el) { el.classList.add("border-sky-500","bg-sky-500/10","text-sky-400"); el.classList.remove("border-slate-600","text-slate-300"); }
    document.getElementById("classStat").textContent = cls === "dropper" ? "Dropper" : cls;
    showToast("Preference saved!", "success");
  }
  window.setClass = setClass;

  // My courses
  const pc = document.getElementById("profileCourses");
  if (purchases.length === 0) {
    pc.innerHTML = `<div class="card-glass rounded-2xl p-4 text-center"><p class="text-slate-500 text-sm">No courses yet.</p><a href="course.html" class="mt-2 inline-block text-sky-400 text-sm font-semibold">Browse →</a></div>`;
  } else {
    pc.innerHTML = purchases.map(id => {
      const c = COURSES.find(x=>x.id===id);
      if (!c) return "";
      return `<div class="card-glass rounded-xl p-4 flex items-center gap-3 mb-2">
        <span class="text-2xl">${{c1:"⚡",c2:"🔋"}[id]||"📚"}</span>
        <div class="flex-1">
          <p class="font-semibold text-white text-sm">${c.title}</p>
          <p class="text-slate-500 text-xs">${c.lectures} lectures</p>
        </div>
        <a href="access.html?id=${id}" class="text-sky-400 text-xs font-semibold bg-sky-500/10 px-3 py-1.5 rounded-lg">Open</a>
      </div>`;
    }).join("");
  }
</script>
</body>
</html>
