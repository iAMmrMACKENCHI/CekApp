<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#000000"/>
  <title>Physics Reels — Physics with Vikas</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sora:["Sora","sans-serif"], dm:["DM Sans","sans-serif"] },
      }}
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family:"DM Sans",sans-serif; background:#000; color:#fff; overflow:hidden; }
    #reels-container { height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; }
    .reel-item { height:100dvh; scroll-snap-align:start; scroll-snap-stop:always; position:relative; background:#000; }
    .reel-iframe { width:100%; height:100%; border:none; pointer-events:none; }
    .reel-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 50%, rgba(0,0,0,.3) 100%); }
    .reel-info { position:absolute; bottom:0; left:0; right:0; padding:24px 20px 100px; }
    .reel-actions { position:absolute; right:16px; bottom:140px; display:flex; flex-direction:column; gap:20px; align-items:center; }
    .action-btn { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .action-btn svg { width:28px; height:28px; }
    .action-btn span { font-size:11px; color:rgba(255,255,255,.7); }
    .tag-chip { background:rgba(2,132,199,.3); border:1px solid rgba(2,132,199,.5); color:#7DD3FC; font-size:11px; padding:2px 10px; border-radius:100px; }
    .diff-chip { font-size:11px; padding:2px 10px; border-radius:100px; }
    .diff-Easy { background:rgba(16,185,129,.2); color:#6EE7B7; border:1px solid rgba(16,185,129,.3); }
    .diff-Medium { background:rgba(245,158,11,.2); color:#FCD34D; border:1px solid rgba(245,158,11,.3); }
    .diff-Hard { background:rgba(239,68,68,.2); color:#FCA5A5; border:1px solid rgba(239,68,68,.3); }

    /* CTA Overlay */
    #cta-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(12px); z-index:100; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; }
    #cta-overlay.show { display:flex; }

    /* Top Bar */
    #top-bar { position:fixed; top:0; left:0; right:0; z-index:50; display:flex; align-items:center; justify-between; padding:16px 20px; background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent); }

    /* Bottom Nav */
    #bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(0,0,0,.8); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,.08); }

    /* Loading state */
    .reel-loader { position:absolute; inset:0; display:flex; align-items:center; justify-center; background:#111; }

    .progress-bar { position:fixed; top:0; left:0; height:2px; background:#0284C7; z-index:200; transition:width .3s; }
  </style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-bar" id="progressBar" style="width:0%"></div>

<!-- Top Bar -->
<div id="top-bar">
  <a href="dashboard.html" class="text-white/70">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <div class="flex flex-col items-center">
    <span class="font-sora font-bold text-white text-sm">Physics Reels</span>
    <span class="text-white/40 text-xs" id="reelCounter">1 / 8</span>
  </div>
  <button onclick="toggleFilter()" class="text-white/70">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 010 2H4a1 1 0 01-1-1zM6 10h12M9 16h6"/>
    </svg>
  </button>
</div>

<!-- Reels Container -->
<div id="reels-container">
  <!-- Populated by JS -->
</div>

<!-- CTA Overlay (shown every 3 reels) -->
<div id="cta-overlay">
  <div class="w-16 h-16 rounded-2xl bg-sky-500 flex items-center justify-center text-3xl mb-5 shadow-xl shadow-sky-500/30">⚛️</div>
  <h2 class="font-sora font-bold text-white text-2xl text-center mb-2">Want to go deeper?</h2>
  <p class="text-slate-400 text-sm text-center mb-8 max-w-xs">These short reels are just the beginning. Get the full lecture with notes and practice problems.</p>
  <div class="w-full max-w-xs space-y-3">
    <a href="course.html" class="w-full bg-sky-500 text-white font-sora font-semibold py-4 rounded-2xl flex items-center justify-center gap-2">
      📚 Go to Full Course
    </a>
    <button onclick="hideCTA()" class="w-full bg-slate-800 text-slate-300 font-medium py-3.5 rounded-2xl">
      Continue Watching Reels
    </button>
  </div>
</div>

<!-- Filter Drawer -->
<div id="filterDrawer" class="fixed inset-x-0 bottom-0 z-[200] transform translate-y-full transition-transform duration-300">
  <div class="bg-slate-900 border-t border-slate-700 rounded-t-3xl p-6 max-w-md mx-auto">
    <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-5"></div>
    <h3 class="font-sora font-bold text-white text-lg mb-4">Filter Reels</h3>
    <div class="mb-4">
      <p class="text-slate-400 text-sm mb-2">Class</p>
      <div class="flex gap-2">
        <button onclick="setFilter('class','11')" id="f11" class="filter-btn px-4 py-2 rounded-xl border border-slate-600 text-sm font-medium text-slate-300 hover:border-sky-500 transition">Class 11</button>
        <button onclick="setFilter('class','12')" id="f12" class="filter-btn px-4 py-2 rounded-xl border border-slate-600 text-sm font-medium text-slate-300 hover:border-sky-500 transition">Class 12</button>
        <button onclick="setFilter('class','')" id="fall" class="filter-btn px-4 py-2 rounded-xl border border-sky-500 bg-sky-500/10 text-sm font-medium text-sky-400">All</button>
      </div>
    </div>
    <button onclick="applyFilter()" class="w-full bg-sky-500 text-white font-semibold py-3 rounded-xl mt-2">Apply</button>
  </div>
</div>
<div id="filterBackdrop" class="fixed inset-0 z-[199] bg-black/60 hidden" onclick="toggleFilter()"></div>

<!-- Bottom Nav -->
<nav id="bottom-nav">
  <div class="flex justify-around py-3 max-w-md mx-auto">
    <a href="dashboard.html" class="flex flex-col items-center gap-1 text-white/40">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      <span class="text-xs">Home</span>
    </a>
    <a href="reels.html" class="flex flex-col items-center gap-1 text-sky-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      <span class="text-xs">Reels</span>
    </a>
    <a href="course.html" class="flex flex-col items-center gap-1 text-white/40">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <span class="text-xs">Courses</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-1 text-white/40">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <span class="text-xs">Profile</span>
    </a>
  </div>
</nav>

<script src="script.js"></script>
<script>
let reelsData = [];
let currentReelIndex = 0;
let savedVideos = JSON.parse(localStorage.getItem("pwv_saved") || "[]");

function buildReelHTML(reel, index) {
  const tags = (reel.tags || "").split(",").slice(0,2);
  const embedUrl = reel.videoUrl.replace("watch?v=","embed/") + "?autoplay=0&controls=1&modestbranding=1&rel=0";
  return `
  <div class="reel-item" data-index="${index}" data-id="${reel.id}">
    <div class="absolute inset-0 bg-gradient-to-b from-slate-900 to-black flex items-center justify-center">
      <iframe class="reel-iframe" src="${embedUrl}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe>
    </div>
    <div class="reel-overlay"></div>

    <!-- Info -->
    <div class="reel-info">
      <div class="flex items-center gap-2 flex-wrap mb-2">
        <span class="tag-chip">Class ${reel.class}</span>
        ${tags.map(t=>`<span class="tag-chip">${t.trim()}</span>`).join("")}
        <span class="diff-chip diff-${reel.difficulty}">${reel.difficulty}</span>
      </div>
      <h3 class="font-sora font-bold text-white text-xl leading-tight mb-1">${reel.topic}</h3>
      <p class="text-slate-400 text-sm">Tap the video to play • Swipe up for next</p>
    </div>

    <!-- Side Actions -->
    <div class="reel-actions">
      <button class="action-btn" onclick="toggleSave('${reel.id}',this)">
        <svg class="w-7 h-7 ${savedVideos.includes(reel.id) ? 'text-sky-400' : 'text-white'}" fill="${savedVideos.includes(reel.id) ? 'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
        </svg>
        <span>Save</span>
      </button>
      <button class="action-btn" onclick="shareReel('${reel.topic}')">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
        </svg>
        <span>Share</span>
      </button>
      <a href="course.html" class="action-btn">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <span>Course</span>
      </a>
    </div>
  </div>`;
}

async function initReels() {
  const prefs = Prefs.get();
  let data = [...MOCK_REELS];
  if (prefs.class) data = data.filter(r => r.class === prefs.class);
  // Shuffle
  data = data.sort(() => Math.random() - 0.5);
  reelsData = data;

  const container = document.getElementById("reels-container");
  container.innerHTML = data.map((r,i) => buildReelHTML(r,i)).join("");
  updateCounter(0);

  // Intersection Observer for counter & CTA
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = parseInt(entry.target.dataset.index);
        currentReelIndex = idx;
        updateCounter(idx);
        updateProgress(idx);
        if (idx > 0 && (idx + 1) % 3 === 0) {
          setTimeout(() => showCTA(), 8000);
        }
      }
    });
  }, { threshold: 0.8 });

  container.querySelectorAll(".reel-item").forEach(el => observer.observe(el));
}

function updateCounter(idx) {
  document.getElementById("reelCounter").textContent = `${idx+1} / ${reelsData.length}`;
}
function updateProgress(idx) {
  const pct = ((idx+1) / reelsData.length) * 100;
  document.getElementById("progressBar").style.width = pct + "%";
}
function showCTA() {
  document.getElementById("cta-overlay").classList.add("show");
}
function hideCTA() {
  document.getElementById("cta-overlay").classList.remove("show");
}
function toggleSave(id, btn) {
  if (savedVideos.includes(id)) {
    savedVideos = savedVideos.filter(x=>x!==id);
    btn.querySelector("svg").setAttribute("fill","none");
    btn.querySelector("svg").classList.remove("text-sky-400");
    btn.querySelector("svg").classList.add("text-white");
    showToast("Removed from saved", "info");
  } else {
    savedVideos.push(id);
    btn.querySelector("svg").setAttribute("fill","currentColor");
    btn.querySelector("svg").classList.add("text-sky-400");
    btn.querySelector("svg").classList.remove("text-white");
    showToast("Saved! 🔖", "success");
  }
  localStorage.setItem("pwv_saved", JSON.stringify(savedVideos));
}
function shareReel(topic) {
  if (navigator.share) {
    navigator.share({ title: topic + " — Physics with Vikas", url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => showToast("Link copied!", "info"));
  }
}

// Filter
let filterClass = Prefs.get().class || "";
function toggleFilter() {
  const d = document.getElementById("filterDrawer");
  const b = document.getElementById("filterBackdrop");
  const isOpen = !d.classList.contains("translate-y-full");
  d.classList.toggle("translate-y-full", isOpen);
  b.classList.toggle("hidden", isOpen);
}
function setFilter(key, val) {
  filterClass = val;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.remove("border-sky-500","bg-sky-500/10","text-sky-400");
    b.classList.add("border-slate-600","text-slate-300");
  });
  const map = {"11":"f11","12":"f12","":"fall"};
  const active = document.getElementById(map[val]);
  if (active) { active.classList.add("border-sky-500","bg-sky-500/10","text-sky-400"); active.classList.remove("border-slate-600","text-slate-300"); }
}
function applyFilter() {
  Prefs.set({ class: filterClass });
  toggleFilter();
  initReels();
}

initReels();
</script>
</body>
</html>
