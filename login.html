<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0284C7"/>
  <title>Login — Physics with Vikas</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sora:["Sora","sans-serif"], dm:["DM Sans","sans-serif"] },
        colors: { primary:"#0284C7", dark:"#0F172A", card:"#1E293B" }
      }}
    }
  </script>
  <style>
    body { font-family:"DM Sans",sans-serif; background:#0F172A; color:#fff; }
    .input-field { background:#1E293B; border:1px solid #334155; color:#fff; transition:border-color .2s; }
    .input-field:focus { outline:none; border-color:#0284C7; box-shadow:0 0 0 3px rgba(2,132,199,.15); }
    .input-field::placeholder { color:#64748B; }
    .input-field.error { border-color:#EF4444; }
    .hero-glow { background:radial-gradient(ellipse 60% 40% at 50% 0%, rgba(2,132,199,.25) 0%, transparent 60%); }
    /* Password toggle button */
    .pwd-wrap { position:relative; }
    .pwd-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none;
                  color:#64748B; cursor:pointer; padding:4px; }
    .pwd-toggle:hover { color:#94A3B8; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
<div class="hero-glow absolute inset-0 h-64 pointer-events-none"></div>

<div class="relative z-10 flex flex-col min-h-screen px-5 max-w-md mx-auto w-full">

  <!-- Back -->
  <div class="pt-6">
    <a href="index.html" class="text-slate-400 text-sm flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
  </div>

  <!-- Header -->
  <div class="pt-8 pb-8 text-center">
    <div class="w-16 h-16 rounded-2xl bg-sky-500 mx-auto flex items-center justify-center text-3xl mb-4 shadow-lg shadow-sky-500/30">⚛️</div>
    <h1 class="font-sora font-bold text-2xl">Welcome back!</h1>
    <p class="text-slate-400 text-sm mt-1">Continue your physics journey</p>
  </div>

  <!-- Credential hint -->
  <div class="bg-amber-500/10 border border-amber-500/30 rounded-2xl px-4 py-3 mb-5 flex items-start gap-3">
    <span class="text-amber-400 text-lg mt-0.5">💡</span>
    <p class="text-amber-300 text-xs leading-relaxed">
      Your password was sent to your email when you registered. Check your inbox or spam folder.
    </p>
  </div>

  <!-- Login Form -->
  <form id="loginForm" class="space-y-4" novalidate>

    <!-- Email -->
    <div>
      <label class="text-slate-300 text-sm font-medium block mb-2">Email Address</label>
      <input id="loginEmail" type="email" placeholder="your@email.com" required autocomplete="email"
        class="input-field w-full px-4 py-3.5 rounded-xl text-base"/>
    </div>

    <!-- Password -->
    <div>
      <label class="text-slate-300 text-sm font-medium block mb-2">Password</label>
      <div class="pwd-wrap">
        <input id="loginPassword" type="password" placeholder="Password from your email" required autocomplete="current-password"
          class="input-field w-full px-4 py-3.5 pr-12 rounded-xl text-base"/>
        <button type="button" class="pwd-toggle" onclick="togglePwd()" title="Show/hide password">
          <svg id="eyeShow" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          <svg id="eyeHide" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <p id="loginErr" class="text-red-400 text-sm hidden text-center bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3"></p>

    <!-- Submit -->
    <div class="pt-2">
      <button type="submit" id="loginBtn"
        class="w-full bg-sky-500 hover:bg-sky-400 active:bg-sky-600 text-white font-sora font-semibold py-4 rounded-2xl text-base transition shadow-lg shadow-sky-500/30 relative overflow-hidden">
        <span id="btnText">Login →</span>
        <span id="btnLoader" class="hidden absolute inset-0 flex items-center justify-center">
          <svg class="animate-spin w-5 h-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"/>
          </svg>
        </span>
      </button>
    </div>
  </form>

  <!-- Divider -->
  <div class="flex items-center gap-3 my-6">
    <div class="flex-1 h-px bg-slate-700"></div>
    <span class="text-slate-500 text-xs">OR</span>
    <div class="flex-1 h-px bg-slate-700"></div>
  </div>

  <!-- Guest Access -->
  <button onclick="guestLogin()"
    class="w-full bg-slate-800 border border-slate-700 text-slate-300 font-medium py-3.5 rounded-2xl text-sm hover:border-sky-500/40 transition">
    🎥 Continue as Guest (Reels only)
  </button>

  <!-- Register Link -->
  <div class="py-8 text-center">
    <p class="text-slate-400 text-sm">Don't have an account?
      <a href="register.html" class="text-sky-400 font-semibold ml-1">Register free →</a>
    </p>
  </div>

</div>

<script src="script.js"></script>
<script>
  Auth.requireGuest();

  // ── Password toggle ─────────────────────────────────────────
  function togglePwd() {
    var inp  = document.getElementById('loginPassword');
    var show = document.getElementById('eyeShow');
    var hide = document.getElementById('eyeHide');
    if (inp.type === 'password') {
      inp.type = 'text';
      show.classList.add('hidden');
      hide.classList.remove('hidden');
    } else {
      inp.type = 'password';
      show.classList.remove('hidden');
      hide.classList.add('hidden');
    }
  }
  window.togglePwd = togglePwd;

  // ── UI helpers ──────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('btnText').classList.toggle('hidden', on);
    document.getElementById('btnLoader').classList.toggle('hidden', !on);
    document.getElementById('loginBtn').disabled = on;
  }

  function showErr(msg) {
    var el = document.getElementById('loginErr');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function hideErr() {
    document.getElementById('loginErr').classList.add('hidden');
  }

  // ── Form Submit ─────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideErr();

    var email    = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value.trim();

    // Basic client-side checks
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showErr('Please enter a valid email address.'); return;
    }
    if (!password) {
      showErr('Please enter your password.'); return;
    }

    setLoading(true);

    try {
      var result = await API.loginStudent(email, password);

      if (result.success) {
        Auth.setUser(Object.assign({}, result.student, { loggedIn: true }));
        showToast('Welcome back, ' + result.student.name + '! 👋', 'success');
        setTimeout(function(){ window.location.href = 'dashboard.html'; }, 700);

      } else {
        showErr(result.error || 'Login failed. Please check your credentials.');
        setLoading(false);
      }

    } catch (err) {
      if (err.message === 'APPS_SCRIPT_NOT_CONFIGURED') {
        // ── Offline fallback: check localStorage ─────────────
        var stored = Auth.getUser();
        if (stored && stored.email === email) {
          // We can't verify password offline — warn and allow in demo mode only
          Auth.setUser(Object.assign({}, stored, { loggedIn: true }));
          showToast('Logged in (offline mode) 👋', 'success');
          setTimeout(function(){ window.location.href = 'dashboard.html'; }, 700);
        } else {
          showErr('Backend not configured yet. Register first or contact Vikas Sir.');
          setLoading(false);
        }
      } else {
        // Network failure — try local fallback
        var stored = Auth.getUser();
        if (stored && stored.email === email) {
          Auth.setUser(Object.assign({}, stored, { loggedIn: true }));
          showToast('Network issue — logged in locally.', 'warning');
          setTimeout(function(){ window.location.href = 'dashboard.html'; }, 700);
        } else {
          showErr('Connection error. Please check your internet and try again.');
          setLoading(false);
        }
      }
    }
  });

  // ── Guest login ─────────────────────────────────────────────
  function guestLogin() {
    Auth.setUser({ name:'Guest', phone:'', email:'', guest:true, loggedIn:true });
    window.location.href = 'reels.html';
  }
  window.guestLogin = guestLogin;
</script>
</body>
</html>
