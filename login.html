<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0284C7"/>
  <title>Login — Physics with Vikas</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sora:["Sora","sans-serif"], dm:["DM Sans","sans-serif"] },
        colors: { primary:"#0284C7", dark:"#0F172A", card:"#1E293B" }
      }}
    }
  </script>
  <style>
    body { font-family:"DM Sans",sans-serif; background:#0F172A; color:#fff; }
    .input-field { background:#1E293B; border:1px solid #334155; color:#fff; transition:border-color .2s; }
    .input-field:focus { outline:none; border-color:#0284C7; box-shadow:0 0 0 3px rgba(2,132,199,.15); }
    .input-field::placeholder { color:#64748B; }
    .hero-glow { background:radial-gradient(ellipse 60% 40% at 50% 0%, rgba(2,132,199,.25) 0%, transparent 60%); }
  </style>
</head>
<body class="min-h-screen flex flex-col">
<div class="hero-glow absolute inset-0 h-64 pointer-events-none"></div>

<div class="relative z-10 flex flex-col min-h-screen px-5 max-w-md mx-auto w-full">

  <!-- Back -->
  <div class="pt-6">
    <a href="index.html" class="text-slate-400 text-sm flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
  </div>

  <div class="pt-8 pb-8 text-center">
    <div class="w-16 h-16 rounded-2xl bg-sky-500 mx-auto flex items-center justify-center text-3xl mb-4 shadow-lg shadow-sky-500/30">⚛️</div>
    <h1 class="font-sora font-bold text-2xl">Welcome back!</h1>
    <p class="text-slate-400 text-sm mt-1">Continue your physics journey</p>
  </div>

  <form id="loginForm" class="space-y-4" novalidate>

    <div>
      <label class="text-slate-300 text-sm font-medium block mb-2">Phone Number</label>
      <input id="phone" type="tel" placeholder="10-digit mobile number" maxlength="10" required
        class="input-field w-full px-4 py-3.5 rounded-xl text-base"/>
    </div>

    <div>
      <label class="text-slate-300 text-sm font-medium block mb-2">Email Address</label>
      <input id="email" type="email" placeholder="your@email.com" required
        class="input-field w-full px-4 py-3.5 rounded-xl text-base"/>
      <p id="loginErr" class="text-red-400 text-xs mt-2 hidden text-center">No account found. Please sign up first.</p>
    </div>

    <div class="pt-2">
      <button type="submit" id="loginBtn"
        class="w-full bg-sky-500 hover:bg-sky-400 text-white font-sora font-semibold py-4 rounded-2xl text-base transition shadow-lg shadow-sky-500/30 relative overflow-hidden">
        <span id="btnText">Login →</span>
        <span id="btnLoader" class="hidden absolute inset-0 flex items-center justify-center">
          <svg class="animate-spin w-5 h-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"/>
          </svg>
        </span>
      </button>
    </div>
  </form>

  <!-- Divider -->
  <div class="flex items-center gap-3 my-6">
    <div class="flex-1 h-px bg-slate-700"></div>
    <span class="text-slate-500 text-xs">OR</span>
    <div class="flex-1 h-px bg-slate-700"></div>
  </div>

  <!-- Guest Access -->
  <button onclick="guestLogin()"
    class="w-full bg-slate-800 border border-slate-700 text-slate-300 font-medium py-3.5 rounded-2xl text-sm hover:border-sky-500/40 transition">
    Continue as Guest (Reels only)
  </button>

  <div class="py-8 text-center">
    <p class="text-slate-400 text-sm">Don't have an account?
      <a href="signup.html" class="text-sky-400 font-semibold ml-1">Sign up free →</a>
    </p>
  </div>
</div>

<script src="script.js"></script>
<script>
  Auth.requireGuest();

  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();

    document.getElementById("btnText").classList.add("hidden");
    document.getElementById("btnLoader").classList.remove("hidden");
    document.getElementById("loginBtn").disabled = true;

    setTimeout(() => {
      // Check localStorage for existing user
      const stored = Auth.getUser();
      if (stored && (stored.phone === phone || stored.email === email)) {
        Auth.setUser({ ...stored, loggedIn: true });
        showToast("Welcome back, " + stored.name + "! 👋", "success");
        setTimeout(() => { window.location.href = "dashboard.html"; }, 600);
      } else {
        // Auto-create session with provided details
        if (phone.length === 10 && email.includes("@")) {
          Auth.setUser({ name: "Student", phone, email, loggedIn: true });
          showToast("Logged in!", "success");
          setTimeout(() => { window.location.href = "dashboard.html"; }, 600);
        } else {
          document.getElementById("loginErr").classList.remove("hidden");
          document.getElementById("btnText").classList.remove("hidden");
          document.getElementById("btnLoader").classList.add("hidden");
          document.getElementById("loginBtn").disabled = false;
        }
      }
    }, 800);
  });

  function guestLogin() {
    Auth.setUser({ name:"Guest", phone:"", email:"", guest:true, loggedIn:true });
    window.location.href = "reels.html";
  }
</script>
</body>
</html>
